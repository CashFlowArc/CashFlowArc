limit_req_zone $binary_remote_addr zone=cfa_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=cfa_trader:10m rate=60r/m;
limit_req_status 429;

server {
    server_tokens off;
    server_name cashflowarc.com www.cashflowarc.com;

    location = /budget {
        return 301 /budget/;
    }

    location ~ ^/budget/(login|register|forgot-password)$ {
        limit_req zone=cfa_auth burst=20 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /budget/ {
        proxy_pass http://127.0.0.1:8788/budget/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location = /trader {
        return 301 /trader/;
    }

    location /trader/ {
        limit_req zone=cfa_trader burst=30 nodelay;
        proxy_pass http://127.0.0.1:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
