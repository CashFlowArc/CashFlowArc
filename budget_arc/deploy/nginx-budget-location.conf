# Add these locations inside the existing CashFlowArc.com server block.
# This keeps CashFlowArc's existing Flask server untouched.

location = /budget {
    return 301 /budget/;
}

location /budget/ {
    proxy_pass http://127.0.0.1:8788/budget/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /budget;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
}

