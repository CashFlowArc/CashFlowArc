name: Pull latest code on OEL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pull:
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Update repo on server
        run: |
          cd /home/opc/CashFlowArc
          git fetch origin
          git reset --hard origin/main

      - name: Update BudgetArc app dependencies
        run: |
          if [ -d /home/opc/CashFlowArc/budget_arc ]; then
            cd /home/opc/CashFlowArc/budget_arc
            sudo mkdir -p /opt/budget-arc
            sudo chown -R opc:opc /opt/budget-arc
            python3 -m venv /opt/budget-arc/venv
            . /opt/budget-arc/venv/bin/activate
            pip install -r requirements.txt
          fi

      - name: Restart BudgetArc service if installed
        run: |
          if systemctl list-unit-files budget-arc.service >/dev/null 2>&1; then
            sudo systemctl restart budget-arc || true
            sudo systemctl --no-pager --full status budget-arc || true
          else
            echo "budget-arc.service is not installed yet; skipping restart."
          fi

      - name: Install or update BudgetArc on OEL
        env:
          BUDGET_ADMIN_PASSWORD: ${{ secrets.BUDGET_ADMIN_PASSWORD }}
          BUDGET_EMAIL_FROM: ${{ secrets.BUDGET_EMAIL_FROM || 'info@cashflowarc.com' }}
          BUDGET_SMTP_HOST: ${{ secrets.BUDGET_SMTP_HOST || 'smtp.email.us-ashburn-1.oci.oraclecloud.com' }}
          BUDGET_SMTP_PORT: ${{ secrets.BUDGET_SMTP_PORT || '587' }}
          BUDGET_SMTP_USERNAME: ${{ secrets.BUDGET_SMTP_USERNAME }}
          BUDGET_SMTP_PASSWORD: ${{ secrets.BUDGET_SMTP_PASSWORD }}
          BUDGET_SMTP_USE_TLS: ${{ secrets.BUDGET_SMTP_USE_TLS || 'true' }}
          BUDGET_SMTP_USE_SSL: ${{ secrets.BUDGET_SMTP_USE_SSL || 'false' }}
          BUDGET_SMTP_TIMEOUT: ${{ secrets.BUDGET_SMTP_TIMEOUT || '20' }}
          TELLER_APPLICATION_ID: ${{ secrets.TELLER_APPLICATION_ID || 'app_pruhi46s81ij37cq5i000' }}
          TELLER_ENVIRONMENT: ${{ secrets.TELLER_ENVIRONMENT || 'development' }}
          TELLER_API_VERSION: ${{ secrets.TELLER_API_VERSION }}
          TELLER_CERT_PATH: ${{ secrets.TELLER_CERT_PATH || '/etc/budget-arc/teller/certificate.pem' }}
          TELLER_CERT_KEY_PATH: ${{ secrets.TELLER_CERT_KEY_PATH || '/etc/budget-arc/teller/private_key.pem' }}
          TELLER_SIGNING_PUBLIC_KEY: ${{ secrets.TELLER_SIGNING_PUBLIC_KEY }}
          TELLER_ALLOW_UNVERIFIED_SIGNATURES: ${{ secrets.TELLER_ALLOW_UNVERIFIED_SIGNATURES || 'false' }}
          TELLER_INSTITUTION_ID: ${{ secrets.TELLER_INSTITUTION_ID || 'amex' }}
        run: |
          cd /home/opc/CashFlowArc/budget_arc
          bash deploy/install_budget_arc_on_oel.sh

      - name: Send BudgetArc SMTP test email
        if: contains(github.event.head_commit.message, '[budget-email-test]')
        run: |
          cd /home/opc/CashFlowArc/budget_arc
          sudo /opt/budget-arc/venv/bin/python -m budget_teller_oracle test-email \
            --env-file /etc/budget-arc/budget.env \
            --to doug.hahn@live.com

      - name: BudgetArc server routing diagnostics
        run: |
          echo "=== hostname ==="
          hostname
          echo "=== listening ports ==="
          sudo ss -ltnp | sed -E 's/users:\(\(\"[^\"]+\",pid=[0-9]+,fd=[0-9]+\)\)/users:REDACTED/g' || true
          echo "=== relevant processes ==="
          ps -ef | grep -E 'server.py|gunicorn|nginx|httpd|budget_teller_oracle' | grep -v grep || true
          echo "=== relevant services ==="
          systemctl list-unit-files | grep -Ei 'cash|budget|nginx|httpd|gunicorn' || true
          echo "=== nginx layout ==="
          if command -v nginx >/dev/null 2>&1; then
            nginx -V 2>&1 | head -5 || true
            sudo find /etc/nginx -maxdepth 3 -type f | sort || true
            sudo grep -R "server_name\|proxy_pass\|include .*default.d\|location /" /etc/nginx 2>/dev/null || true
          else
            echo "nginx not installed"
          fi
