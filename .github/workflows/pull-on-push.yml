name: Pull latest code on OEL

on:
  push:
    branches: [ main ]

jobs:
  pull:
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Update repo on server
        run: |
          cd /home/opc/CashFlowArc
          git fetch origin
          git reset --hard origin/main

      - name: Update BudgetArc app dependencies
        run: |
          if [ -d /home/opc/CashFlowArc/budget_arc ]; then
            cd /home/opc/CashFlowArc/budget_arc
            python3 -m venv .venv
            . .venv/bin/activate
            pip install -r requirements.txt
          fi

      - name: Restart BudgetArc service if installed
        run: |
          if systemctl list-unit-files budget-arc.service >/dev/null 2>&1; then
            sudo systemctl restart budget-arc || true
            sudo systemctl --no-pager --full status budget-arc || true
          else
            echo "budget-arc.service is not installed yet; skipping restart."
          fi

      - name: Install or update BudgetArc on OEL
        run: |
          cd /home/opc/CashFlowArc/budget_arc
          bash deploy/install_budget_arc_on_oel.sh

      - name: BudgetArc server routing diagnostics
        run: |
          echo "=== hostname ==="
          hostname
          echo "=== listening ports ==="
          sudo ss -ltnp | sed -E 's/users:\(\(\"[^\"]+\",pid=[0-9]+,fd=[0-9]+\)\)/users:REDACTED/g' || true
          echo "=== relevant processes ==="
          ps -ef | grep -E 'server.py|gunicorn|nginx|httpd|budget_teller_oracle' | grep -v grep || true
          echo "=== relevant services ==="
          systemctl list-unit-files | grep -Ei 'cash|budget|nginx|httpd|gunicorn' || true
          echo "=== nginx layout ==="
          if command -v nginx >/dev/null 2>&1; then
            nginx -V 2>&1 | head -5 || true
            sudo find /etc/nginx -maxdepth 3 -type f | sort || true
            sudo grep -R "server_name\|proxy_pass\|include .*default.d\|location /" /etc/nginx 2>/dev/null || true
          else
            echo "nginx not installed"
          fi
